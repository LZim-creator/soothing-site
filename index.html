<!DOCTYPE html>
<html>
<head>
  <title>For You</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #fff0f5;
      margin-top: 70px;
    }

    .stick {
      font-size: 80px;
      margin: 20px 0;
    }

    button {
      padding: 12px 22px;
      font-size: 16px;
      margin-top: 20px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #ffb6c1;
    }

    .box {
      max-width: 500px;
      margin: auto;
    }
  </style>
</head>

<body>

<div class="box" id="content">

  <h1>I made you something</h1>
  <div class="stick">🙂</div>

  <p>I know I don’t always say things the right way…</p>

  <button onclick="next()">Next</button>

</div>

<script>
function next() {
  document.getElementById("content").innerHTML = `
    <h1>But I actually like you</h1>
    <div class="stick">💗🙂</div>

    <p>I just didn’t show it right sometimes</p>
    <p>This song explains it better than I can</p>

    <!-- 🎵 MUSIC PLAYER (VISIBLE + WORKS) -->
    <iframe width="320" height="180"
    src="https://www.youtube.com/embed/tdKmewyZPXE"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
    </iframe>

    <br>

    <button onclick="final()">Next</button>
  `;
}

function final() {
  document.getElementById("content").innerHTML = `
    <h1>That’s it…</h1>
    <div class="stick">🥺</div>

    <p>I just wanted you to hear it the right way</p>
    <p>No pressure… I just meant it</p>
  `;
}
</script>

</body>
</html>
