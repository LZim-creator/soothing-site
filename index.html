<!DOCTYPE html>
<html>
<head>
  <title>For You</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #fff0f5;
      margin-top: 80px;
    }

    .stick {
      font-size: 80px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>I made you something</h1>

<div class="stick">🙂</div>

<p>I know I don’t always say things the right way…</p>

<button onclick="next()">Next</button>

<script>
function next() {
  document.body.innerHTML = `
    <h1>But I actually like you</h1>
    <div class="stick">💗🙂</div>
    <p>I just didn’t show it right sometimes</p>

    <p>Press play when you're ready</p>

    <!-- 🎵 MUSIC STARTS HERE -->
    <iframe width="0" height="0"
    src="https://www.youtube.com/embed/tdKmewyZPXE?autoplay=1&loop=1&playlist=tdKmewyZPXE"
    frameborder="0"
    allow="autoplay">
    </iframe>

    <button onclick="final()">Next</button>
  `;
}

function final() {
  document.body.innerHTML = `
    <h1>That’s it…</h1>
    <div class="stick">🥺</div>
    <p>I just wanted you to hear it the right way</p>
  `;
}
</script>

</body>
</html>
